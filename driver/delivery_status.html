<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Delivery Status - Driver</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="../logo.png" alt="Logo" class="logo">
            <span class="title">Update Delivery Status</span>
        </div>
        <a href="dashboard.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back</a>
    </header>

    <nav>
        <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="delivery_tracking.html"><i class="fa fa-map-marker"></i> My Deliveries</a>
        <a href="pickup_instructions.html"><i class="fa fa-truck"></i> Pickup Info</a>
        <a href="delivery_status.html" class="active"><i class="fa fa-refresh"></i> Update Status</a>
    </nav>

    <main>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="card-header">
                <span class="card-title">Update Delivery Status</span>
            </div>
            <form>
                <div class="form-group">
                    <label for="delivery-id">Delivery ID</label>
                    <select id="delivery-id" name="delivery-id" required>
                        <option value="">Select Delivery</option>
                        <option value="DEL-001">DEL-001 - Rice to Dhaka</option>
                        <option value="DEL-002">DEL-002 - Rice to Super Shop A</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">Current Status</label>
                    <select id="status" name="status" required>
                        <option value="">Select Status</option>
                        <option value="picked">Picked Up</option>
                        <option value="transit">In Transit</option>
                        <option value="arrived">Arrived at Destination</option>
                        <option value="delivered">Delivered</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="location">Current Location</label>
                    <input type="text" id="location" name="location" placeholder="Enter current location">
                </div>
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="Any additional notes"></textarea>
                </div>
                <button type="submit" class="btn-submit"><i class="fa fa-check"></i> Update Status</button>
            </form>
        </div>
    </main>
</body>
</html>
