    <main>
      <div class="card" style="max-width: 600px; margin: 0 auto">
        <div class="card-header">
          <span class="card-title">Update Delivery Status</span>
        </div>
        <form
          onsubmit="event.preventDefault(); alert('Delivery status updated successfully!');"
        >
          <div class="form-group">
            <label for="delivery-id">Delivery ID</label>
            <select id="delivery-id" name="delivery-id" required>
              <option value="">Select Delivery</option>
              <option value="DEL-001">DEL-001 - Rice to Dhaka</option>
              <option value="DEL-002">DEL-002 - Rice to Super Shop A</option>
            </select>
          </div>
          <div class="form-group">
            <label for="status">Current Status</label>
            <select id="status" name="status" required>
              <option value="">Select Status</option>
              <option value="picked">Picked Up</option>
              <option value="transit">In Transit</option>
              <option value="arrived">Arrived at Destination</option>
              <option value="delivered">Delivered</option>
            </select>
          </div>
          <div class="form-group">
            <label for="location">Current Location</label>
            <input
              type="text"
              id="location"
              name="location"
              placeholder="Enter current location"
            />
          </div>
          <div class="form-group">
            <label for="notes">Notes</label>
            <textarea
              id="notes"
              name="notes"
              rows="3"
              placeholder="Any additional notes"
            ></textarea>
          </div>
          <button type="submit" class="btn-submit">
            <i class="fa fa-check"></i> Update Status
          </button>
        </form>
      </div>
    </main>
  </body>
