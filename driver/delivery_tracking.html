<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Tracking - Driver</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="../logo.png" alt="Logo" class="logo">
            <span class="title">My Deliveries</span>
        </div>
        <a href="dashboard.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back</a>
    </header>

    <nav>
        <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="delivery_tracking.html" class="active"><i class="fa fa-map-marker"></i> My Deliveries</a>
        <a href="pickup_instructions.html"><i class="fa fa-truck"></i> Pickup Info</a>
        <a href="delivery_status.html"><i class="fa fa-refresh"></i> Update Status</a>
    </nav>

    <main>
        <div class="card">
            <div class="card-header">
                <span class="card-title">My Delivery Tasks</span>
            </div>
            <table>
                <tr>
                    <th>Delivery ID</th>
                    <th>Pickup From</th>
                    <th>Destination</th>
                    <th>Product</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>DEL-001</td>
                    <td>Farmer Rahim</td>
                    <td>Dhaka Warehouse</td>
                    <td>Rice (500kg)</td>
                    <td><span class="status in-transit">In Transit</span></td>
                </tr>
                <tr>
                    <td>DEL-002</td>
                    <td>Dhaka Warehouse</td>
                    <td>Super Shop A</td>
                    <td>Rice (200kg)</td>
                    <td><span class="status pending">Pending</span></td>
                </tr>
            </table>
        </div>
    </main>
</body>
</html>
