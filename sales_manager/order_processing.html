<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Orders - Sales Manager</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="../logo.png" alt="Logo" class="logo">
            <span class="title">Process Orders</span>
        </div>
        <a href="dashboard.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back</a>
    </header>

    <nav>
        <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="order_processing.html" class="active"><i class="fa fa-shopping-cart"></i> Process Orders</a>
        <a href="sales_reports.html"><i class="fa fa-bar-chart"></i> Reports</a>
        <a href="customer_management.html"><i class="fa fa-users"></i> Customers</a>
    </nav>

    <main>
        <div class="card">
            <div class="card-header">
                <span class="card-title">Pending Orders</span>
            </div>
            <table>
                <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Amount</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
                <tr>
                    <td>ORD-001</td>
                    <td>Super Shop A</td>
                    <td>Rice</td>
                    <td>200 kg</td>
                    <td>10,000 BDT</td>
                    <td>2026-03-15</td>
                    <td>
                        <button class="btn btn-primary">Approve</button>
                        <button class="btn btn-danger">Reject</button>
                    </td>
                </tr>
                <tr>
                    <td>ORD-002</td>
                    <td>Local Market</td>
                    <td>Wheat</td>
                    <td>150 kg</td>
                    <td>7,500 BDT</td>
                    <td>2026-03-14</td>
                    <td>
                        <button class="btn btn-primary">Approve</button>
                        <button class="btn btn-danger">Reject</button>
                    </td>
                </tr>
            </table>
        </div>
    </main>
</body>
</html>
