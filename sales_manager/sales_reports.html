<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Reports - Sales Manager</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="../logo.png" alt="Logo" class="logo">
            <span class="title">Sales Reports</span>
        </div>
        <a href="dashboard.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back</a>
    </header>

    <nav>
        <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="order_processing.html"><i class="fa fa-shopping-cart"></i> Process Orders</a>
        <a href="sales_reports.html" class="active"><i class="fa fa-bar-chart"></i> Reports</a>
        <a href="customer_management.html"><i class="fa fa-users"></i> Customers</a>
    </nav>

    <main>
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa fa-shopping-cart"></i>
                <div class="value">85</div>
                <div class="label">Total Orders</div>
            </div>
            <div class="stat-card">
                <i class="fa fa-check-circle"></i>
                <div class="value">65</div>
                <div class="label">Completed</div>
            </div>
            <div class="stat-card">
                <i class="fa fa-money"></i>
                <div class="value">1.2M</div>
                <div class="label">Total Sales</div>
            </div>
            <div class="stat-card">
                <i class="fa fa-users"></i>
                <div class="value">12</div>
                <div class="label">Customers</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="card-title">Sales by Product</span>
            </div>
            <table>
                <tr>
                    <th>Product</th>
                    <th>Quantity Sold</th>
                    <th>Revenue</th>
                </tr>
                <tr>
                    <td>Rice</td>
                    <td>2,500 kg</td>
                    <td>125,000 BDT</td>
                </tr>
                <tr>
                    <td>Wheat</td>
                    <td>1,800 kg</td>
                    <td>90,000 BDT</td>
                </tr>
                <tr>
                    <td>Potatoes</td>
                    <td>1,200 kg</td>
                    <td>48,000 BDT</td>
                </tr>
            </table>
        </div>
    </main>
</body>
</html>
