<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management - Sales Manager</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="../logo.png" alt="Logo" class="logo">
            <span class="title">Customer Management</span>
        </div>
        <a href="dashboard.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back</a>
    </header>

    <nav>
        <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="order_processing.html"><i class="fa fa-shopping-cart"></i> Process Orders</a>
        <a href="sales_reports.html"><i class="fa fa-bar-chart"></i> Reports</a>
        <a href="customer_management.html" class="active"><i class="fa fa-users"></i> Customers</a>
    </nav>

    <main>
        <div class="card">
            <div class="card-header">
                <span class="card-title">All Customers</span>
                <button class="btn btn-primary"><i class="fa fa-plus"></i> Add Customer</button>
            </div>
            <table>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Contact</th>
                    <th>Total Orders</th>
                    <th>Total Spent</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Super Shop A</td>
                    <td>Super Shop</td>
                    <td>0171xxxxxxx</td>
                    <td>25</td>
                    <td>450,000 BDT</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Local Market</td>
                    <td>Market</td>
                    <td>0172xxxxxxx</td>
                    <td>60</td>
                    <td>750,000 BDT</td>
                </tr>
            </table>
        </div>
    </main>
</body>
</html>
