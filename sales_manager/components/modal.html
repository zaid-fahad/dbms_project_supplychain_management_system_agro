<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Order Details</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">{{CONTENT}}</div>
    </div>
</div>

<script>
function viewDetails(id, customer, items, totalAmount, orderDate, deliveryDate, status, paymentStatus) {
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Order ID:</span><span class="detail-value">${id}</span></div>
        <div class="detail-row"><span class="detail-label">Customer:</span><span class="detail-value">${customer}</span></div>
        <div class="detail-row"><span class="detail-label">Items:</span><span class="detail-value">${items}</span></div>
        <div class="detail-row"><span class="detail-label">Total Amount:</span><span class="detail-value">${totalAmount}</span></div>
        <div class="detail-row"><span class="detail-label">Order Date:</span><span class="detail-value">${orderDate}</span></div>
        <div class="detail-row"><span class="detail-label">Delivery Date:</span><span class="detail-value">${deliveryDate}</span></div>
        <div class="detail-row"><span class="detail-label">Order Status:</span><span class="detail-value"><span class="status ${status === 'Delivered' ? 'completed' : 'pending'}">${status}</span></span></div>
        <div class="detail-row"><span class="detail-label">Payment Status:</span><span class="detail-value"><span class="status ${paymentStatus === 'Paid' ? 'completed' : 'pending'}">${paymentStatus}</span></span></div>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary">Process</button><button class="btn btn-danger" onclick="closeModal()">Close</button></div>
    `;
    document.getElementById('detailsModal').classList.add('active');
}
function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
</script>
