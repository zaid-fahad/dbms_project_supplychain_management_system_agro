<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Quality Check Details</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">{{CONTENT}}</div>
    </div>
</div>

<script>
function viewDetails(id, batchId, produce, quantity, qualityGrade, inspector, date, status) {
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Check ID:</span><span class="detail-value">${id}</span></div>
        <div class="detail-row"><span class="detail-label">Batch ID:</span><span class="detail-value">${batchId}</span></div>
        <div class="detail-row"><span class="detail-label">Produce:</span><span class="detail-value">${produce}</span></div>
        <div class="detail-row"><span class="detail-label">Quantity:</span><span class="detail-value">${quantity}</span></div>
        <div class="detail-row"><span class="detail-label">Quality Grade:</span><span class="detail-value">${qualityGrade}</span></div>
        <div class="detail-row"><span class="detail-label">Inspector:</span><span class="detail-value">${inspector}</span></div>
        <div class="detail-row"><span class="detail-label">Date:</span><span class="detail-value">${date}</span></div>
        <div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value"><span class="status ${status === 'Approved' ? 'completed' : 'pending'}">${status}</span></span></div>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary">Update</button><button class="btn btn-danger" onclick="closeModal()">Close</button></div>
    `;
    document.getElementById('detailsModal').classList.add('active');
}
function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
</script>
