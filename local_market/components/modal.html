<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Market Order Details</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">{{CONTENT}}</div>
    </div>
</div>

<script>
function viewDetails(id, produce, quantity, unitPrice, totalAmount, vendor, orderDate, status) {
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Order ID:</span><span class="detail-value">${id}</span></div>
        <div class="detail-row"><span class="detail-label">Produce:</span><span class="detail-value">${produce}</span></div>
        <div class="detail-row"><span class="detail-label">Quantity:</span><span class="detail-value">${quantity}</span></div>
        <div class="detail-row"><span class="detail-label">Unit Price:</span><span class="detail-value">${unitPrice}</span></div>
        <div class="detail-row"><span class="detail-label">Total Amount:</span><span class="detail-value">${totalAmount}</span></div>
        <div class="detail-row"><span class="detail-label">Vendor:</span><span class="detail-value">${vendor}</span></div>
        <div class="detail-row"><span class="detail-label">Order Date:</span><span class="detail-value">${orderDate}</span></div>
        <div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value"><span class="status ${status === 'Completed' ? 'completed' : 'pending'}">${status}</span></span></div>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary">View Vendor</button><button class="btn btn-danger" onclick="closeModal()">Close</button></div>
    `;
    document.getElementById('detailsModal').classList.add('active');
}
function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
</script>
