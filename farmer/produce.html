    <main>
      <div class="card" style="max-width: 600px; margin: 0 auto">
        <div class="card-header">
          <span class="card-title">Submit New Produce</span>
        </div>
        <form
          onsubmit="event.preventDefault(); alert('Produce submitted successfully!');"
        >
          <div class="form-group">
            <label for="produce-type">Produce Type</label>
            <select id="produce-type" name="produce-type" required>
              <option value="">Select Produce</option>
              <option value="rice">Rice</option>
              <option value="wheat">Wheat</option>
              <option value="potatoes">Potatoes</option>
              <option value="vegetables">Vegetables</option>
              <option value="fruits">Fruits</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quantity">Quantity (kg)</label>
            <input
              type="number"
              id="quantity"
              name="quantity"
              placeholder="Enter quantity in kg"
              required
            />
          </div>
          <div class="form-group">
            <label for="harvest-date">Harvest Date</label>
            <input type="date" id="harvest-date" name="harvest-date" required />
          </div>
          <div class="form-group">
            <label for="location">Farm Location</label>
            <input
              type="text"
              id="location"
              name="location"
              placeholder="Enter your farm location"
              required
            />
          </div>
          <div class="form-group">
            <label for="price">Expected Price (BDT/kg)</label>
            <input
              type="number"
              id="price"
              name="price"
              placeholder="Enter expected price per kg"
              required
            />
          </div>
          <button type="submit" class="btn-submit">
            <i class="fa fa-check"></i> Submit Produce
          </button>
        </form>
      </div>
    </main>
  </body>
