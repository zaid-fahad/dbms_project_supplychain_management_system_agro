<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>{{TITLE}}</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">{{CONTENT}}</div>
    </div>
</div>

<script>
function viewDetails(id, type, quantity, date, status, price) {
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Batch ID:</span><span class="detail-value">${id}</span></div>
        <div class="detail-row"><span class="detail-label">Produce Type:</span><span class="detail-value">${type}</span></div>
        <div class="detail-row"><span class="detail-label">Quantity:</span><span class="detail-value">${quantity}</span></div>
        <div class="detail-row"><span class="detail-label">Date:</span><span class="detail-value">${date}</span></div>
        <div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value"><span class="status ${status === 'Approved' || status === 'Delivered' ? 'completed' : 'pending'}">${status}</span></span></div>
        <div class="detail-row"><span class="detail-label">Price:</span><span class="detail-value">${price}</span></div>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary">Edit</button><button class="btn btn-danger" onclick="closeModal()">Close</button></div>
    `;
    document.getElementById('detailsModal').classList.add('active');
}
function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
</script>
