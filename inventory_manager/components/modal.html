<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Stock Details</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">{{CONTENT}}</div>
    </div>
</div>

<script>
function viewDetails(id, produce, category, quantity, unit, location, lastUpdated, status) {
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Stock ID:</span><span class="detail-value">${id}</span></div>
        <div class="detail-row"><span class="detail-label">Produce:</span><span class="detail-value">${produce}</span></div>
        <div class="detail-row"><span class="detail-label">Category:</span><span class="detail-value">${category}</span></div>
        <div class="detail-row"><span class="detail-label">Quantity:</span><span class="detail-value">${quantity} ${unit}</span></div>
        <div class="detail-row"><span class="detail-label">Location:</span><span class="detail-value">${location}</span></div>
        <div class="detail-row"><span class="detail-label">Last Updated:</span><span class="detail-value">${lastUpdated}</span></div>
        <div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value"><span class="status ${status === 'In Stock' ? 'completed' : 'pending'}">${status}</span></span></div>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary">Update Stock</button><button class="btn btn-danger" onclick="closeModal()">Close</button></div>
    `;
    document.getElementById('detailsModal').classList.add('active');
}
function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
</script>
