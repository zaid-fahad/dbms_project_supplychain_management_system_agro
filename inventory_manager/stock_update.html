    <main>
      <div class="card" style="max-width: 600px; margin: 0 auto">
        <div class="card-header">
          <span class="card-title">Update Inventory Stock</span>
        </div>
        <form
          onsubmit="event.preventDefault(); alert('Stock updated successfully!');"
        >
          <div class="form-group">
            <label for="batch-number">Batch Number</label>
            <select id="batch-number" name="batch-number" required>
              <option value="">Select Approved Batch</option>
              <option value="FS-002">FS-002 (Wheat - 300kg)</option>
              <option value="FS-003">FS-003 (Potatoes - 200kg)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="produce-type">Produce Type</label>
            <select id="produce-type" name="produce-type" required>
              <option value="">Select Produce</option>
              <option value="rice">Rice</option>
              <option value="wheat">Wheat</option>
              <option value="potatoes">Potatoes</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quantity-in">Quantity In (kg)</label>
            <input
              type="number"
              id="quantity-in"
              name="quantity-in"
              placeholder="Enter quantity in"
            />
          </div>
          <div class="form-group">
            <label for="quantity-out">Quantity Out (kg)</label>
            <input
              type="number"
              id="quantity-out"
              name="quantity-out"
              placeholder="Enter quantity out"
            />
          </div>
          <div class="form-group">
            <label for="location">Storage Location</label>
            <select id="location" name="location" required>
              <option value="">Select Warehouse</option>
              <option value="dhaka">Dhaka Warehouse</option>
              <option value="barisal">Barisal Warehouse</option>
            </select>
          </div>
          <button type="submit" class="btn-submit">
            <i class="fa fa-check"></i> Update Stock
          </button>
        </form>
      </div>
    </main>
  </body>
