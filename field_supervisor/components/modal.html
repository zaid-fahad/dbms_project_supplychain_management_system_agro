<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Purchase Details</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">{{CONTENT}}</div>
    </div>
</div>

<script>
function viewDetails(id, farmer, produce, quantity, date, amount, location) {
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Purchase ID:</span><span class="detail-value">${id}</span></div>
        <div class="detail-row"><span class="detail-label">Farmer:</span><span class="detail-value">${farmer}</span></div>
        <div class="detail-row"><span class="detail-label">Produce:</span><span class="detail-value">${produce}</span></div>
        <div class="detail-row"><span class="detail-label">Quantity:</span><span class="detail-value">${quantity}</span></div>
        <div class="detail-row"><span class="detail-label">Date:</span><span class="detail-value">${date}</span></div>
        <div class="detail-row"><span class="detail-label">Amount:</span><span class="detail-value">${amount}</span></div>
        <div class="detail-row"><span class="detail-label">Location:</span><span class="detail-value">${location}</span></div>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary">Edit</button><button class="btn btn-danger" onclick="closeModal()">Close</button></div>
    `;
    document.getElementById('detailsModal').classList.add('active');
}
function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
</script>
