    <main>
      <div class="card" style="max-width: 600px; margin: 0 auto">
        <div class="card-header">
          <span class="card-title">New Order Form</span>
        </div>
        <form
          onsubmit="event.preventDefault(); alert('Order placed successfully!');"
        >
          <div class="form-group">
            <label for="produce-type">Produce Type</label>
            <select id="produce-type" name="produce-type" required>
              <option value="">Select Produce</option>
              <option value="rice">Rice</option>
              <option value="wheat">Wheat</option>
              <option value="potatoes">Potatoes</option>
              <option value="vegetables">Vegetables</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quantity">Quantity (kg)</label>
            <input
              type="number"
              id="quantity"
              name="quantity"
              placeholder="Enter quantity"
              required
            />
          </div>
          <div class="form-group">
            <label for="delivery-date">Required Delivery Date</label>
            <input
              type="date"
              id="delivery-date"
              name="delivery-date"
              required
            />
          </div>
          <div class="form-group">
            <label for="delivery-address">Delivery Address</label>
            <input
              type="text"
              id="delivery-address"
              name="delivery-address"
              placeholder="Enter delivery address"
              required
            />
          </div>
          <div class="form-group">
            <label for="notes">Special Instructions</label>
            <textarea
              id="notes"
              name="notes"
              rows="2"
              placeholder="Any special requirements"
            ></textarea>
          </div>
          <button type="submit" class="btn-submit">
            <i class="fa fa-check"></i> Submit Order
          </button>
        </form>
      </div>
    </main>
  </body>
