<div class="modal" id="detailsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Delivery Details</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalBody">{{CONTENT}}</div>
    </div>
</div>

<script>
function viewDetails(id, orderId, pickupLocation, deliveryLocation, driver, vehicle, scheduledDate, status) {
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Delivery ID:</span><span class="detail-value">${id}</span></div>
        <div class="detail-row"><span class="detail-label">Order ID:</span><span class="detail-value">${orderId}</span></div>
        <div class="detail-row"><span class="detail-label">Pickup Location:</span><span class="detail-value">${pickupLocation}</span></div>
        <div class="detail-row"><span class="detail-label">Delivery Location:</span><span class="detail-value">${deliveryLocation}</span></div>
        <div class="detail-row"><span class="detail-label">Driver:</span><span class="detail-value">${driver}</span></div>
        <div class="detail-row"><span class="detail-label">Vehicle:</span><span class="detail-value">${vehicle}</span></div>
        <div class="detail-row"><span class="detail-label">Scheduled Date:</span><span class="detail-value">${scheduledDate}</span></div>
        <div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value"><span class="status ${status === 'Delivered' ? 'completed' : 'pending'}">${status}</span></span></div>
        <div style="margin-top:20px;display:flex;gap:10px;"><button class="btn btn-primary">Assign</button><button class="btn btn-danger" onclick="closeModal()">Close</button></div>
    `;
    document.getElementById('detailsModal').classList.add('active');
}
function closeModal() { document.getElementById('detailsModal').classList.remove('active'); }
</script>
