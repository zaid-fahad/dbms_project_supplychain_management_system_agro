<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickup Requests - Transport Manager</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <img src="../logo.png" alt="Logo" class="logo">
            <span class="title">Pickup Requests</span>
        </div>
        <a href="dashboard.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back</a>
    </header>

    <nav>
        <a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="pickup_requests.html" class="active"><i class="fa fa-truck"></i> Pickup Requests</a>
        <a href="delivery_orders.html"><i class="fa fa-send"></i> Delivery Orders</a>
        <a href="fleet_management.html"><i class="fa fa-car"></i> Fleet Management</a>
    </nav>

    <main>
        <div class="card">
            <div class="card-header">
                <span class="card-title">Pending Pickup Requests</span>
            </div>
            <table>
                <tr>
                    <th>Request ID</th>
                    <th>From</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Destination</th>
                    <th>Action</th>
                </tr>
                <tr>
                    <td>PU-001</td>
                    <td>Farmer Rahim</td>
                    <td>Rice</td>
                    <td>500 kg</td>
                    <td>Dhaka Warehouse</td>
                    <td><button class="btn btn-primary">Assign Driver</button></td>
                </tr>
                <tr>
                    <td>PU-002</td>
                    <td>Farmer Karim</td>
                    <td>Wheat</td>
                    <td>300 kg</td>
                    <td>Barisal Warehouse</td>
                    <td><button class="btn btn-primary">Assign Driver</button></td>
                </tr>
            </table>
        </div>
    </main>
</body>
</html>
